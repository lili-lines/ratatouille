<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <p class="footer-oneline">
      <span class="footer-title">{{ site.title | escape }}</span>
      {%- if site.description -%}
        <span class="footer-sep"> — </span><span class="footer-desc">{{ site.description | escape }}</span>
      {%- endif -%}
      {%- if site.author -%}
        <span class="footer-sep"> — </span><span class="footer-author p-name">{{ site.author | escape }}</span>
      {%- endif -%}
    </p>
  </div>
</footer>
